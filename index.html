<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Frontend Mentor | Contact form</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main>
      <form class="contact-form" novalidate>
        <h1>Contact Us</h1>

        <div class="form-row">
          <div class="form-group">
            <label for="first-name">
              First Name <span>*</span>
            </label>

            <input
              type="text"
              id="first-name"
              name="firstName"
              required
            />

            <small class="error-message">
              This field is required
            </small>
          </div>

          <div class="form-group">
            <label for="last-name">
              Last Name <span>*</span>
            </label>

            <input
              type="text"
              id="last-name"
              name="lastName"
              required
            />

            <small class="error-message">
              This field is required
            </small>
          </div>
        </div>

        <fieldset class="form-group">
          <legend>
            Query Type <span>*</span>
          </legend>

          <div class="radio-group">
            <label class="radio-option">
              <input
                type="radio"
                name="query"
                value="general"
                required
              />

              <span>General Enquiry</span>
            </label>

            <label class="radio-option">
              <input
                type="radio"
                name="query"
                value="support"
              />

              <span>Support Request</span>
            </label>
          </div>

          <small class="error-message radio-error">
            Please select a query type
          </small>
        </fieldset>

        <div class="form-group">
          <label for="email">
            Email Address <span>*</span>
          </label>

          <input
            type="email"
            id="email"
            name="email"
            required
          />

          <small class="error-message">
            Please enter a valid email address
          </small>
        </div>

        <div class="form-group">
          <label for="message">
            Message <span>*</span>
          </label>

          <textarea
            id="message"
            name="message"
            rows="5"
            required
          ></textarea>

          <small class="error-message">
            This field is required
          </small>
        </div>

        <div class="checkbox-group">
          <label for="consent">
            <input
              type="checkbox"
              id="consent"
              required
            />

            <span>
              I consent to being contacted by the team *
            </span>
          </label>

          <small class="error-message">
            To submit this form, please consent to being contacted
          </small>
        </div>

        <button type="submit">
          Submit
        </button>

        <div
          class="success-toast"
          aria-live="polite"
        >
          Message Sent!
        </div>
      </form>
    </main>

    <script src="script.js"></script>
  </body>
</html>
